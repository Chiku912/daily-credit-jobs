name: Daily Credit Job Scraper

on:
  schedule:
    # Runs automatically at 3:00 AM UTC (8:30 AM IST) every day
    - cron: '0 3 * * *' 
  workflow_dispatch: # Allows you to run it manually with the button

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install requests pandas

      - name: Run Scraper (Connected to Google API)
        env:
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
          GCP_CX_ID: ${{ secrets.GCP_CX_ID }}
        run: python job_aggregator.py

      - name: Save Updated Dashboard to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add job_dashboard.html
          git commit -m "Automated daily job update via Google Search" || exit 0
          git push
