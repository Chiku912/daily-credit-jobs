name: Daily Credit Job Scraper

on:
  schedule:
    # Runs automatically at 3:00 AM UTC (which is 8:30 AM IST) every day
    - cron: '0 3 * * *' 
  workflow_dispatch: # This adds a button so you can run it manually anytime

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install py-linkedin-jobs-scraper pandas

      - name: Run Scraper
        run: python job_aggregator.py

      - name: Save Updated Dashboard to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add job_dashboard.html
          git commit -m "Automated daily job update" || exit 0
          git push
